<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="980">
    <stop stop-color="#071523"/>
    <stop offset="1" stop-color="#0B2740"/>
  </linearGradient>
  <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
    <stop stop-color="#112F48"/>
    <stop offset="1" stop-color="#0C2134"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#02111E" flood-opacity="0.45"/>
  </filter>
  <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
    <path d="M0,0 L14,7 L0,14 z" fill="#62A7D7"/>
  </marker>
</defs>
<rect width="1600" height="980" rx="28" fill="url(#bg)"/>
<text x="74" y="76" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="800">Azure VM Manager — Architecture Overview</text>
<text x="74" y="116" fill="#9EC2DD" font-family="Segoe UI, Arial, sans-serif" font-size="20">Desktop operator UI, Azure REST integration, encrypted config handling, and local/Azure scheduling pathways.</text>

<g filter="url(#shadow)">
  <rect x="76" y="170" width="430" height="260" rx="24" fill="url(#panel)" stroke="#28506F"/>
  <text x="108" y="214" fill="#9BD9FF" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">Desktop Operator UI</text>
  <text x="108" y="252" fill="#D9E7F2" font-family="Segoe UI, Arial, sans-serif" font-size="18">Tkinter / ttk application</text>
  <rect x="108" y="280" width="166" height="34" rx="10" fill="#103652"/><text x="126" y="303" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="16">VMs tab</text>
  <rect x="286" y="280" width="166" height="34" rx="10" fill="#103652"/><text x="304" y="303" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="16">Config Files tab</text>
  <rect x="108" y="328" width="166" height="34" rx="10" fill="#103652"/><text x="126" y="351" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="16">Schedules tab</text>
  <rect x="286" y="328" width="166" height="34" rx="10" fill="#103652"/><text x="304" y="351" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="16">Detail panel</text>
  <text x="108" y="394" fill="#A7C0D4" font-family="Segoe UI, Arial, sans-serif" font-size="16">- Status icons and live row updates</text>
  <text x="108" y="420" fill="#A7C0D4" font-family="Segoe UI, Arial, sans-serif" font-size="16">- JSON viewing, decrypt/open, save, save-as-encrypted</text>
</g>

<g filter="url(#shadow)">
  <rect x="585" y="170" width="430" height="260" rx="24" fill="url(#panel)" stroke="#28506F"/>
  <text x="617" y="214" fill="#9BD9FF" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">Application Services</text>
  <text x="617" y="252" fill="#D9E7F2" font-family="Segoe UI, Arial, sans-serif" font-size="18">Internal engines behind the UI</text>
  <rect x="617" y="280" width="168" height="34" rx="10" fill="#103652"/><text x="635" y="303" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="16">Azure auth</text>
  <rect x="801" y="280" width="180" height="34" rx="10" fill="#103652"/><text x="819" y="303" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="16">REST request layer</text>
  <rect x="617" y="328" width="168" height="34" rx="10" fill="#103652"/><text x="635" y="351" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="16">State polling</text>
  <rect x="801" y="328" width="180" height="34" rx="10" fill="#103652"/><text x="819" y="351" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="16">Thread-safe UI updates</text>
  <text x="617" y="394" fill="#A7C0D4" font-family="Segoe UI, Arial, sans-serif" font-size="16">- VM lifecycle actions</text>
  <text x="617" y="420" fill="#A7C0D4" font-family="Segoe UI, Arial, sans-serif" font-size="16">- Full export builder and config payload builders</text>
</g>

<g filter="url(#shadow)">
