  <text x="1126" y="214" fill="#9BD9FF" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">Azure Platform</text>
  <text x="1126" y="252" fill="#D9E7F2" font-family="Segoe UI, Arial, sans-serif" font-size="18">REST endpoints used by the app</text>
  <rect x="1126" y="280" width="170" height="34" rx="10" fill="#103652"/><text x="1144" y="303" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="16">Subscriptions API</text>
  <rect x="1310" y="280" width="176" height="34" rx="10" fill="#103652"/><text x="1328" y="303" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="16">Compute VM API</text>
  <rect x="1126" y="328" width="170" height="34" rx="10" fill="#103652"/><text x="1144" y="351" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="16">Instance View API</text>
  <rect x="1310" y="328" width="176" height="34" rx="10" fill="#103652"/><text x="1328" y="351" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="16">Network API</text>
  <text x="1126" y="394" fill="#A7C0D4" font-family="Segoe UI, Arial, sans-serif" font-size="16">- VM start / powerOff / delete</text>
  <text x="1126" y="420" fill="#A7C0D4" font-family="Segoe UI, Arial, sans-serif" font-size="16">- NIC, public IP, subnet, NSG, VNet export context</text>
</g>

<g filter="url(#shadow)">
  <rect x="145" y="560" width="470" height="286" rx="24" fill="url(#panel)" stroke="#28506F"/>
  <text x="177" y="604" fill="#9BD9FF" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">Encrypted Config Engine</text>
  <text x="177" y="642" fill="#D9E7F2" font-family="Segoe UI, Arial, sans-serif" font-size="18">Portable automation artifacts</text>
  <rect x="177" y="676" width="198" height="34" rx="10" fill="#103652"/><text x="195" y="699" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="16">Start / stop config</text>
  <rect x="389" y="676" width="190" height="34" rx="10" fill="#103652"/><text x="407" y="699" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="16">Inventory export</text>
  <rect x="177" y="724" width="198" height="34" rx="10" fill="#103652"/><text x="195" y="747" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="16">Full VM export</text>
  <rect x="389" y="724" width="190" height="34" rx="10" fill="#103652"/><text x="407" y="747" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="16">In-app JSON editor</text>
  <text x="177" y="792" fill="#A7C0D4" font-family="Segoe UI, Arial, sans-serif" font-size="16">Encrypted `.encjson` wrappers with password-derived keys</text>
</g>

<g filter="url(#shadow)">
  <rect x="707" y="560" width="470" height="286" rx="24" fill="url(#panel)" stroke="#28506F"/>
  <text x="739" y="604" fill="#9BD9FF" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">Scheduling Layer</text>
  <text x="739" y="642" fill="#D9E7F2" font-family="Segoe UI, Arial, sans-serif" font-size="18">Two-path automation model</text>
  <rect x="739" y="676" width="190" height="34" rx="10" fill="#103652"/><text x="757" y="699" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="16">Local schedules</text>
  <rect x="943" y="676" width="190" height="34" rx="10" fill="#103652"/><text x="961" y="699" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="16">Task registration</text>
  <rect x="739" y="724" width="190" height="34" rx="10" fill="#103652"/><text x="757" y="747" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="16">Azure schedule deploy</text>
  <rect x="943" y="724" width="190" height="34" rx="10" fill="#103652"/><text x="961" y="747" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="16">Enable / disable / remove</text>
  <text x="739" y="792" fill="#A7C0D4" font-family="Segoe UI, Arial, sans-serif" font-size="16">Same operator workflow, two execution targets</text>
</g>

<g filter="url(#shadow)">
  <rect x="1269" y="560" width="186" height="286" rx="24" fill="url(#panel)" stroke="#28506F"/>
  <text x="1301" y="604" fill="#9BD9FF" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">Outcomes</text>
  <text x="1301" y="652" fill="#A7C0D4" font-family="Segoe UI, Arial, sans-serif" font-size="17">Portal-light operations</text>
  <text x="1301" y="690" fill="#A7C0D4" font-family="Segoe UI, Arial, sans-serif" font-size="17">Repeatable automation</text>
  <text x="1301" y="728" fill="#A7C0D4" font-family="Segoe UI, Arial, sans-serif" font-size="17">Portable configs</text>
  <text x="1301" y="766" fill="#A7C0D4" font-family="Segoe UI, Arial, sans-serif" font-size="17">Reconstruction-ready exports</text>
</g>

