<svg width="1600" height="940" viewBox="0 0 1600 940" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="940">
    <stop stop-color="#071523"/>
    <stop offset="1" stop-color="#0B2740"/>
  </linearGradient>
  <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
    <stop stop-color="#112F48"/>
    <stop offset="1" stop-color="#0C2134"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#02111E" flood-opacity="0.45"/>
  </filter>
  <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
    <path d="M0,0 L14,7 L0,14 z" fill="#62A7D7"/>
  </marker>
</defs>
<rect width="1600" height="940" rx="28" fill="url(#bg)"/>
<text x="74" y="76" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="800">Azure VM Manager — Scheduling Flow</text>
<text x="74" y="116" fill="#9EC2DD" font-family="Segoe UI, Arial, sans-serif" font-size="20">One scheduling UI, two execution paths: local Windows scheduling and Azure-side schedule deployment.</text>

<g filter="url(#shadow)">
  <rect x="90" y="184" width="350" height="192" rx="24" fill="url(#panel)" stroke="#28506F"/>
  <text x="122" y="228" fill="#9BD9FF" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">Schedules Tab</text>
  <text x="122" y="266" fill="#D9E7F2" font-family="Segoe UI, Arial, sans-serif" font-size="18">Operator chooses:</text>
  <text x="122" y="302" fill="#A7C0D4" font-family="Segoe UI, Arial, sans-serif" font-size="17">- VM</text>
  <text x="122" y="332" fill="#A7C0D4" font-family="Segoe UI, Arial, sans-serif" font-size="17">- Action (start / stop)</text>
  <text x="122" y="362" fill="#A7C0D4" font-family="Segoe UI, Arial, sans-serif" font-size="17">- Frequency, days, time, timezone</text>
</g>

<g filter="url(#shadow)">
  <rect x="520" y="184" width="350" height="192" rx="24" fill="url(#panel)" stroke="#28506F"/>
  <text x="552" y="228" fill="#9BD9FF" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">Encrypted Schedule File</text>
  <text x="552" y="266" fill="#D9E7F2" font-family="Segoe UI, Arial, sans-serif" font-size="18">Saved as JSON / encjson</text>
  <text x="552" y="302" fill="#A7C0D4" font-family="Segoe UI, Arial, sans-serif" font-size="17">- VM targeting details</text>
  <text x="552" y="332" fill="#A7C0D4" font-family="Segoe UI, Arial, sans-serif" font-size="17">- Action and schedule metadata</text>
  <text x="552" y="362" fill="#A7C0D4" font-family="Segoe UI, Arial, sans-serif" font-size="17">- Reusable for local or Azure path</text>
</g>

<g filter="url(#shadow)">
  <rect x="950" y="184" width="560" height="192" rx="24" fill="url(#panel)" stroke="#28506F"/>
  <text x="982" y="228" fill="#9BD9FF" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">Decision Point</text>
  <text x="982" y="266" fill="#D9E7F2" font-family="Segoe UI, Arial, sans-serif" font-size="18">How should this schedule execute?</text>
  <rect x="982" y="302" width="214" height="38" rx="10" fill="#103652"/><text x="1002" y="327" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="16">Local execution</text>
  <rect x="1226" y="302" width="214" height="38" rx="10" fill="#103652"/><text x="1246" y="327" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="16">Azure deployment</text>
</g>

<g filter="url(#shadow)">
  <rect x="172" y="500" width="520" height="284" rx="24" fill="url(#panel)" stroke="#28506F"/>
  <text x="204" y="544" fill="#9BD9FF" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">Path A — Local Scheduler</text>
  <text x="204" y="582" fill="#D9E7F2" font-family="Segoe UI, Arial, sans-serif" font-size="18">Good when the operator controls the workstation</text>
  <text x="204" y="624" fill="#A7C0D4" font-family="Segoe UI, Arial, sans-serif" font-size="17">1. Register a Windows Task Scheduler task</text>
  <text x="204" y="656" fill="#A7C0D4" font-family="Segoe UI, Arial, sans-serif" font-size="17">2. Task launches the app or CLI entry point</text>
  <text x="204" y="688" fill="#A7C0D4" font-family="Segoe UI, Arial, sans-serif" font-size="17">3. App authenticates to Azure</text>
  <text x="204" y="720" fill="#A7C0D4" font-family="Segoe UI, Arial, sans-serif" font-size="17">4. App runs start/stop action against the selected VM</text>
</g>

<g filter="url(#shadow)">
  <rect x="910" y="500" width="520" height="284" rx="24" fill="url(#panel)" stroke="#28506F"/>
  <text x="942" y="544" fill="#9BD9FF" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">Path B — Azure Schedule Deploy</text>
  <text x="942" y="582" fill="#D9E7F2" font-family="Segoe UI, Arial, sans-serif" font-size="18">Good when the schedule must run without the PC</text>
  <text x="942" y="624" fill="#A7C0D4" font-family="Segoe UI, Arial, sans-serif" font-size="17">1. App deploys the schedule into Azure</text>
  <text x="942" y="656" fill="#A7C0D4" font-family="Segoe UI, Arial, sans-serif" font-size="17">2. App attaches the target VM</text>
  <text x="942" y="688" fill="#A7C0D4" font-family="Segoe UI, Arial, sans-serif" font-size="17">3. Azure executes the action on schedule</text>
  <text x="942" y="720" fill="#A7C0D4" font-family="Segoe UI, Arial, sans-serif" font-size="17">4. App can later enable, disable, or remove it</text>
</g>

<path d="M440 280H500" stroke="#62A7D7" stroke-width="4" marker-end="url(#arrow)"/>
<path d="M870 280H930" stroke="#62A7D7" stroke-width="4" marker-end="url(#arrow)"/>
<path d="M1100 376L514 490" stroke="#62A7D7" stroke-width="4" marker-end="url(#arrow)"/>
<path d="M1300 376L1168 490" stroke="#62A7D7" stroke-width="4" marker-end="url(#arrow)"/>

<g filter="url(#shadow)">
  <rect x="620" y="822" width="370" height="74" rx="18" fill="#0D2336" stroke="#28506F"/>
  <text x="650" y="866" fill="#CFE7F8" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">Same schedule definition, different execution strategy</text>
</g>
</svg>